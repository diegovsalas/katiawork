{% if GA_ID and request and 'localhost' not in (request.headers.get('host','')) and '127.0.0.1' not in (request.headers.get('host','')) %}
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id={{ GA_ID }}"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', '{{ GA_ID }}');
</script>
{% endif %}
